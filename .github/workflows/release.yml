name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-linux-static:
    name: Linux (static, x86-64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: alpine:3.19
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apk add --no-cache \
            ghc cabal \
            musl-dev zlib-dev zlib-static \
            gmp-dev \
            libffi-dev \
            ncurses-dev ncurses-static \
            git

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal
          key: linux-static-cabal-${{ hashFiles('kroki.cabal') }}
          restore-keys: linux-static-cabal-

      - name: Update Cabal index
        run: cabal update

      - name: Build static binary
        run: |
          cabal build \
            --enable-executable-static \
            --ghc-options="-optl-static -optl-pthread"

      - name: Copy and strip binary
        run: |
          cp $(cabal list-bin kroki) kroki-linux-x86_64
          strip kroki-linux-x86_64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: kroki-linux-x86_64

  build-macos-arm64:
    name: macOS (arm64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: 'latest'

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal
          key: macos-arm64-cabal-${{ hashFiles('kroki.cabal') }}
          restore-keys: macos-arm64-cabal-

      - name: Update Cabal index
        run: cabal update

      - name: Build binary
        run: cabal build

      - name: Copy and strip binary
        run: |
          cp $(cabal list-bin kroki) kroki-macos-arm64
          strip kroki-macos-arm64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: kroki-macos-arm64
